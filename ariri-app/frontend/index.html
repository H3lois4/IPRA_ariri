<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPRA no Ariri</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Indicador de conectividade -->
    <div id="connectivity-indicator" class="connectivity-indicator offline" title="Status da conexão">
        <span class="connectivity-dot"></span>
        <span class="connectivity-label">Offline</span>
    </div>

    <!-- Container principal da SPA -->
    <div id="app"></div>

    <!-- Bottom Navigation Bar -->
    <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Navegação principal">
        <button class="nav-item active" data-route="#/info" onclick="window.location.hash='#/info'" aria-label="Informações" aria-current="page">
            <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            <span class="nav-label">Informações</span>
        </button>

        <button class="nav-item" data-route="#/forms" onclick="window.location.hash='#/forms'" aria-label="Formulários">
            <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
                <line x1="8" y1="10" x2="16" y2="10"/>
                <line x1="8" y1="14" x2="16" y2="14"/>
                <line x1="8" y1="18" x2="12" y2="18"/>
            </svg>
            <span class="nav-label">Formulários</span>
        </button>

        <button class="nav-item" data-route="#/diary" onclick="window.location.hash='#/diary'" aria-label="Diário">
            <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                <line x1="8" y1="7" x2="16" y2="7"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
            <span class="nav-label">Diário</span>
        </button>

        <button class="nav-item" data-route="#/menu" onclick="window.location.hash='#/menu'" aria-label="Menu">
            <svg class="nav-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            <span class="nav-label">Menu</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="js/db.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/pages/splash.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
